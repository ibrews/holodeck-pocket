<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3500A7" />
    <title>Holodeck-in-a-Pocket</title>
    <meta name="description" content="Scan, walk, look around. A WebXR demo by AgileLens / BPI." />
    <meta property="og:title" content="Holodeck-in-a-Pocket" />
    <meta property="og:description" content="Scan, walk, look around. A WebXR demo." />
    <meta property="og:type" content="website" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%233500A7'/%3E%3Ccircle cx='32' cy='32' r='14' fill='none' stroke='%23FE00B5' stroke-width='4'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <canvas id="renderCanvas" touch-action="none"></canvas>

    <div id="hud">
      <div id="topbar">
        <div id="brand">HOLODECK<span class="dot">·</span>POCKET</div>
        <div id="scene-pills" role="tablist" aria-label="Scenes"></div>
        <button id="xr-button" type="button" aria-label="Enter VR" hidden>Enter VR</button>
      </div>

      <aside id="options-panel" aria-label="Design options"></aside>

      <div id="placeholder-note" hidden>
        <strong>Placeholder mode.</strong> Real venue model loads in the live demo.
      </div>

      <div id="hint" hidden></div>
    </div>

    <div id="touch-controls" hidden>
      <div id="joystick" aria-label="Move">
        <div id="joystick-knob"></div>
      </div>
      <div id="look-pad" aria-label="Look">
        <span>drag&nbsp;to&nbsp;look</span>
      </div>
    </div>

    <noscript>
      <div class="boot-msg">This demo needs JavaScript and WebGL.</div>
    </noscript>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
